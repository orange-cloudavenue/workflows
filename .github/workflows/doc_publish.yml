name: "Publish documentation on GitHub Pages"

on:
  workflow_call:
    inputs:
      plugins:
        type: string
        description: "List of plugins to install separated by space"
        required: false
        default: ""
      ref:
        description: "Git reference to checkout"
        required: true
        type: string
      repository:
        description: "Repository to checkout"
        required: true
        type: string

permissions:
  contents: write

jobs:
  check-publish-requirements:
    runs-on: ubuntu-latest
    outputs:
      need-publish: ${{ steps.filter.outputs.files_exists }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}
      - name: 'Check File Existence'
        id: filter
        uses: andstor/file-existence-action@v3
        with:
          files: 'mkdocs.yml'

  publish-doc:
    if: ${{ needs.check-publish-requirements.outputs.need-publish == 'true' || github.event_name == 'workflow_dispatch' }}
    needs: check-publish-requirements
    name: github page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repository }}
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v6
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material mkdocs-literate-nav ${{ inputs.plugins }}
      - run: mkdocs gh-deploy --force
